<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="author" content="Finquizz">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Finquizz</title>
    <meta name="description" content="Finquizz">
    <meta name="keywords" content="Finquizz">
    <link rel="icon" href="assets/images/favicon.png">     
    <link href="https://fonts.googleapis.com/css2?family=Inria+Serif:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libertinus+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/swiper-bundle.min.css">
    <link rel="stylesheet" href="assets/css/main-style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body>
    <div class="main-wrapper">
        <div class="overlay"></div> 
        <main class="play-quiz-page main-wrp">   
            <section class="quiz-play-section">
                <div class="container">
                    <div class="play-quiz-game">
                        <div class="play-quiz-header">
                            <h4>TERM LIFE INSURANCE</h4>
                            <p>Play and Win 300000  
                                <span class="coin">
                                    <img src="./assets/images/Dollar.png" alt="coin">
                                </span>
                            </p>
                        </div>  
                        <div class="play-quiz-stats">
                            <span class="align-items-center score-correct">0</span> 
                            <div class="quiz-timer">
                                <div class="timer-circle">
                                    <svg class="progress-ring" width="90" height="90">
                                    <circle class="progress-ring__bg" cx="45" cy="45" r="40" />
                                    <circle class="progress-ring__circle" cx="45" cy="45" r="40" />
                                    </svg>
                                    <div class="inner-circle">
                                    <span id="timer-value">60</span>
                                    </div>
                                </div>
                            </div> 
                            <span class="score-wrong">0</span>
                        </div>  
                        <div class="play-quiz-box">
                            <p class="quiz-count">Question 1 / 20</p>
                            <h3 class="quiz-question">What does a Policy Extension rider do?</h3>
                            <div class="quiz-options">
                                <button class="quiz-option">Provides additional coverage for critical illness</button>
                                <button class="quiz-option">Converts term insurance to whole life</button>
                                <button class="quiz-option">Extends the policy coverage period beyond the original term</button>
                                <button class="quiz-option">Increases the policy’s cash value</button>
                            </div> 
                        </div>
                        <div class="quiz-btn-wrp d-flex justify-content-center text-center gap-2">
                            <button class="btn">USE LIFELINE</button>
                            <p class="quiz-score">Your score : <strong>0</strong></p>
                        </div>
                    </div>
                </div>
            </section> 
        </main>   
    </div>  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="assets/js/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="assets/js/swiper-bundle.min.js"></script>
    <script src="assets/js/custom.js"></script> 
</body>

</html>
